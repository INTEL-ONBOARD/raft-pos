appId: com.raftpos
productName: Raft POS
directories:
  output: dist-app
files:
  - dist/**/*
  - node_modules/**/*
  - package.json
win:
  target: nsis
  requestedExecutionLevel: requireAdministrator
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
mac:
  target: dmg
  category: public.app-category.business
